- id: boiler_giorno_schedule_on
  alias: Boiler giorno - accensione schedule
  description: >
    Accende la presa del boiler giorno in due finestre fisse (mattina e sera),
    dimensionate sul warm-up di un tank 80L @ 45°C partendo da ~30°C. Sostituisce
    il vecchio mirror 1:1 sul boiler notte. Ad ogni accensione imposta anche il
    countdown hardware della Tapo a 120 min come safety net: se HA non riesce a
    comandare lo spegnimento, la presa si autospegne da sola.
  triggers:
  - trigger: time
    at: '05:30:00'
    id: mattina
  - trigger: time
    at: '18:00:00'
    id: sera
  conditions: []
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.boiler_giorno
  - action: number.set_value
    target:
      entity_id: number.boiler_giorno_turn_off_in
    data:
      value: 120
  mode: single
- id: boiler_giorno_schedule_off
  alias: Boiler giorno - spegnimento schedule
  description: >
    Spegne la presa all'inizio della finestra d'uso (07:00 e 19:30). Così al
    primo prelievo il tank è caldo e si raffredda durante l'uso invece di
    perdere calore in standby.
  triggers:
  - trigger: time
    at: '07:00:00'
  - trigger: time
    at: '19:30:00'
  conditions: []
  actions:
  - action: switch.turn_off
    target:
      entity_id: switch.boiler_giorno
  mode: single
