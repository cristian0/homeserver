- id: '1773851340463'
  alias: Ritira la tenda della veranda prima della pioggia
  description: Ritira la tenda della veranda prima che piova, controllando le previsioni
    orarie ogni 30 minuti. Si attiva anche quando il meteo attuale peggiora. Controlla
    le prossime 3 ore di previsioni per pioggia, neve, temporale o vento forte. Ritira
    = open_cover (posizione 100, tenda arrotolata). Abbassa = close_cover (posizione
    0, tenda estesa).
  triggers:
  - platform: time_pattern
    minutes: /30
    id: forecast_check
  - platform: state
    entity_id: weather.home
    id: weather_change
  conditions:
  - condition: state
    entity_id: cover.soggiorno_tenda_veranda
    state: closed
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: weather_change
      - condition: template
        value_template: '{{ states(''weather.home'') in [''lightning-rainy'',''pouring'',''rainy'',''snowy'',''snowy-rainy'',''windy'',''windy-variant'',''exceptional'']
          }}'
      sequence:
      - action: cover.open_cover
        target:
          entity_id: cover.soggiorno_tenda_veranda
    - conditions:
      - condition: trigger
        id: forecast_check
      sequence:
      - action: weather.get_forecasts
        target:
          entity_id: weather.home
        data:
          type: hourly
        response_variable: forecast_data
      - condition: template
        value_template: '{{ forecast_data[''weather.home''].forecast[:3] | selectattr(''condition'',
          ''in'', [''lightning-rainy'',''pouring'',''rainy'',''snowy'',''snowy-rainy'',''windy'',''windy-variant'',''exceptional''])
          | list | count > 0 }}'
      - action: cover.open_cover
        target:
          entity_id: cover.soggiorno_tenda_veranda
  mode: single
